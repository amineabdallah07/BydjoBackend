server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  config:
    import: optional:file:.env.example[.properties]
  application:
    name: bydjo-ecommerce

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bydjo_db}
    username: ${DB_USERNAME:postgres}
    # FIX Bug #11: Password MUST come from environment variable — no hardcoded fallback
    password: ${DB_PASSWORD:midou@123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cache:
    type: simple

# JWT Configuration
app:
  jwt:
    # FIX Bug #12: JWT_SECRET MUST be set in environment — no insecure hardcoded fallback
    secret: ${JWT_SECRET}
    expiration: 86400000 # 24 hours
    refresh-expiration: 604800000 # 7 days

  otp:
    length: 6
    expiration-minutes: 5
    max-attempts: 3
    resend-cooldown-seconds: 60

  sendzen:
    api-key: ${SENDZEN_API_KEY}
    from-number: ${SENDZEN_FROM_NUMBER}

  frontend-url: ${FRONTEND_URL:http://localhost:4200}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-size: 10485760
    allowed-types: image/jpeg,image/png,image/webp,image/gif

  store:
    name: BY DJO
    currency: TND
    currency-symbol: د.ت
    default-language: fr
    phone: +216 XX XXX XXX
    email: contact@bydjo.com
    address: Tunis, Tunisia
    whatsapp: +216XXXXXXXX
    facebook: bydjo
    instagram: bydjo

# Swagger
springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.bydjo: DEBUG
    org.springframework.security: DEBUG
